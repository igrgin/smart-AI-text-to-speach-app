app:
  ai:
    provider-mode: spring-ai-openai
    transcription-model: ${OPENAI_TRANSCRIPTION_MODEL:gpt-4o-mini-transcribe}
    cleanup-model: ${OPENAI_CLEANUP_MODEL:gpt-5.4-mini}

spring:
  ai:
    model:
      audio:
        speech: none
        transcription: openai
      chat: none
      embedding: none
      image: none
      moderation: none
    openai:
      api-key: ${OPENAI_API_KEY}
      audio:
        transcription:
          model: ${OPENAI_TRANSCRIPTION_MODEL:gpt-4o-mini-transcribe}
