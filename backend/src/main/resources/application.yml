app:
  ai:
    provider-mode: fake
    transcription-model: gpt-4o-mini-transcribe
  dictation:
    max-audio-bytes: 25000000
    max-duration-seconds: 600
    supported-audio-types:
      - audio/webm
      - audio/mp4
      - audio/ogg
      - audio/wav

spring:
  ai:
    chat:
      client:
        enabled: false
    model:
      audio:
        speech: none
        transcription: none
      chat: none
      embedding: none
      image: none
      moderation: none
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 26MB
